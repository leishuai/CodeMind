name: AutoMindIOSDemo
options:
  bundleIdPrefix: ai.openclaw.automind
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 15.0
packages: {}
targets:
  AutoMindIOSDemo:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.automind.demo
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - AutoMindIOSDemoUITests

  AutoMindIOSDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - UITests
    dependencies:
      - target: AutoMindIOSDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.automind.demo.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
